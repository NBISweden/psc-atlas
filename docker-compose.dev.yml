services:

  frontend:
    build:
      context: frontend
      dockerfile: ../Dockerfile
      target: frontend-dev
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    volumes:
      - ./frontend:/home/psc-atlas/frontend
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://frontend:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: backend
      dockerfile: ../Dockerfile
      target: backend-dev
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    volumes:
      - ./vol:/home/psc-atlas/vol
      - ./backend:/home/psc-atlas/backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://backend:8000/v1/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  proxy:
    build:
      target: proxy-dev
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
